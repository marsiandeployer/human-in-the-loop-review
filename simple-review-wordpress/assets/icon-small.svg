<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="3" ry="3" fill="white" stroke="#e4e4e4" stroke-width="1"/>
  <!-- Heading line -->
  <rect x="3" y="6" width="13" height="2" rx="1" fill="#1a1a1a"/>
  <!-- Wireframe lines -->
  <rect x="3" y="11" width="26" height="1.5" rx="0.75" fill="#d8d8d8"/>
  <rect x="3" y="15" width="22" height="1.5" rx="0.75" fill="#d8d8d8"/>
  <rect x="3" y="19" width="18" height="1.5" rx="0.75" fill="#d8d8d8"/>
  <!-- Target element -->
  <rect x="3" y="23" width="16" height="3.5" rx="1" fill="#f0f0f0"/>
  <!-- Loupe circle -->
  <circle cx="14" cy="16" r="6" fill="rgba(255,255,255,0.6)" stroke="#dc2626" stroke-width="1.8"/>
  <!-- Loupe handle -->
  <line x1="18.5" y1="20.5" x2="23" y2="25" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
</svg>
