<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
.mb {

.mb-16 {
  width:16px;height:16px;background:#fff;border:1px solid #e4e4e4;border-radius:2px;
  padding:1.5px 1.5px 0;box-shadow:none;
  display:flex;flex-direction:column;gap:1px;

.mb-16 .mb-target{height:2.5px;background:#f0f0f0;border-radius:1px;width:60%;position:relative;}
.mb-16 .mb-loupe{
  position:absolute;top:-7px;left:21%;width:8px;height:8px;
  border:1.5px solid #dc2626;border-radius:49%;
  background:rgba(255,255,255,0.6);box-shadow:none;box-sizing:border-box;
}
.mb-16 .mb-loupe::after{
  content:'';position:absolute;bottom:-1px;right:-2.5px;
  width:3px;height:1.2px;background:#dc2626;border-radius:0.5px;
  transform:rotate(45deg);transform-origin:left center;
}
