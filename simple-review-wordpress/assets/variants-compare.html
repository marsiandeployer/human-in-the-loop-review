<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Hero banners — rendered at zoom×</title>
<style>
body { font-family: system-ui, sans-serif; background:#f5f5f5; padding:40px; }
.row { display:flex; gap:48px; align-items:flex-end; }
.item { text-align:center; }
.item img { display:block; image-rendering:pixelated; }
.item p { margin-top:10px; font-size:13px; font-weight:600; color:#333; }
.item small { display:block; color:#888; font-size:11px; margin-top:2px; }
hr { margin:30px 0; border:none; border-top:1px solid #ddd; }
h2 { font-size:14px; color:#666; margin-bottom:10px; }
</style>
</head>
<body>

<h2>Native size (как в hero):</h2>
<div class="row">
  <div class="item">
    <img src="banner-128.png?v=5" width="128" height="128">
    <p>128×128</p>
  </div>
  <div class="item">
    <img src="banner-60.png?v=5" width="60" height="60">
    <p>60×60</p>
  </div>
  <div class="item">
    <img src="banner-16.png?v=5" width="16" height="16">
    <p>16×16</p>
  </div>
</div>

<hr>

<h2>Увеличено ×4 для разглядывания:</h2>
<div class="row">
  <div class="item">
    <img src="banner-128.png?v=5" width="512" height="512">
    <p>128 → 512</p>
  </div>
  <div class="item">
    <img src="banner-60.png?v=5" width="240" height="240">
    <p>60 → 240</p>
  </div>
  <div class="item">
    <img src="banner-16.png?v=5" width="128" height="128">
    <p>16 → 128</p>
  </div>
</div>

</body></html>
